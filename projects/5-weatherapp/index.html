<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skye — Weather App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="theme-default">

  <!-- dynamic background layers -->
  <div class="bg-layer" id="bgLayer"></div>
  <div class="bg-overlay"></div>
  <div class="particles" id="particles"></div>

  <div class="app">

    <!-- HEADER -->
    <header class="app-header">
      <div class="logo">
        <span class="logo-icon">◈</span>
        <span class="logo-text">Skye</span>
      </div>
      <button class="unit-toggle" id="unitToggle" title="Toggle °C / °F">
        <span class="unit active-unit" id="unitC">°C</span>
        <span class="unit-sep">/</span>
        <span class="unit" id="unitF">°F</span>
      </button>
    </header>

    <!-- SEARCH -->
    <div class="search-wrap" id="searchWrap">
      <div class="search-box" id="searchBox">
        <span class="search-icon">⌕</span>
        <input
          type="text"
          id="searchInput"
          class="search-input"
          placeholder="Search city…"
          autocomplete="off"
          spellcheck="false"
        />
        <button class="search-btn" id="searchBtn" aria-label="Search">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
        </button>
      </div>
      <ul class="suggestions" id="suggestions"></ul>
    </div>

    <!-- LOADING -->
    <div class="loading-state" id="loadingState">
      <div class="spinner"></div>
      <p>Fetching weather…</p>
    </div>

    <!-- ERROR -->
    <div class="error-state" id="errorState">
      <div class="error-icon">⚠</div>
      <p id="errorMsg">City not found</p>
      <span>Check the spelling and try again</span>
    </div>

    <!-- WEATHER CARD -->
    <div class="weather-card" id="weatherCard">

      <!-- location + date -->
      <div class="card-top">
        <div class="location-info">
          <h1 class="city-name" id="cityName">—</h1>
          <p class="country-date" id="countryDate">—</p>
        </div>
        <div class="weather-icon-wrap">
          <img id="weatherIcon" src="" alt="weather icon" class="weather-icon" />
        </div>
      </div>

      <!-- main temp -->
      <div class="temp-section">
        <div class="temp-main" id="tempMain">—</div>
        <div class="condition-text" id="conditionText">—</div>
        <div class="feels-like" id="feelsLike">Feels like —</div>
      </div>

      <!-- divider -->
      <div class="card-divider"></div>

      <!-- details grid -->
      <div class="details-grid">
        <div class="detail-item">
          <span class="detail-icon">💧</span>
          <span class="detail-val" id="humidity">—</span>
          <span class="detail-label">Humidity</span>
        </div>
        <div class="detail-item">
          <span class="detail-icon">💨</span>
          <span class="detail-val" id="windSpeed">—</span>
          <span class="detail-label">Wind</span>
        </div>
        <div class="detail-item">
          <span class="detail-icon">👁</span>
          <span class="detail-val" id="visibility">—</span>
          <span class="detail-label">Visibility</span>
        </div>
        <div class="detail-item">
          <span class="detail-icon">🔵</span>
          <span class="detail-val" id="pressure">—</span>
          <span class="detail-label">Pressure</span>
        </div>
      </div>

    </div>

    <!-- IDLE STATE -->
    <div class="idle-state" id="idleState">
      <div class="idle-icon">◈</div>
      <p>Enter a city to see the weather</p>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
